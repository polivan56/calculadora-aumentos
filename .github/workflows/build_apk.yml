# ============================================================
# GITHUB ACTIONS - COMPILADOR AUTOMÁTICO DE APK
# Versión corregida - Junio 2026
# ============================================================

name: 📱 Generar APK Automático

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-24.04
    
    steps:
      - name: 📥 Descargar código
        uses: actions/checkout@v4

      - name: 🐍 Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 📦 Instalar dependencias del sistema
        run: |
          sudo apt update
          sudo apt install -y python3-pip openjdk-21-jdk git zip unzip autoconf libtool libffi-dev libssl-dev
          pip install --upgrade pip setuptools wheel

      - name: 📦 Instalar dependencias Python
        run: |
          pip install buildozer cython kivy plyer

      - name: ⚙️ Configurar Buildozer
        run: |
          buildozer init
          sed -i 's/^title = .*/title = Calculadora Aumentos/' buildozer.spec
          sed -i 's/^package.name = .*/package.name = calculadorap/' buildozer.spec
          sed -i 's/^package.domain = .*/package.domain = org.educacion/' buildozer.spec
          sed -i 's/^requirements = .*/requirements = python3,kivy,plyer/' buildozer.spec
          sed -i 's/^orientation = .*/orientation = portrait/' buildozer.spec
          sed -i 's/^fullscreen = .*/fullscreen = 0/' buildozer.spec
          sed -i 's/^android.permissions = .*/android.permissions = INTERNET/' buildozer.spec
          sed -i 's/^# android.api = .*/android.api = 34/' buildozer.spec
          sed -i 's/^# android.minapi = .*/android.minapi = 24/' buildozer.spec
          echo "✅ Configuración completada"

      - name: 🔨 Compilar APK
        run: |
          buildozer -v android debug
        timeout-minutes: 30

      - name: 📦 Guardar APK
        uses: actions/upload-artifact@v4
        with:
          name: Calculadora-Aumentos-APK
          path: bin/*.apk
          retention-days: 90
